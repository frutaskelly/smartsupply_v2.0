server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Página única: cualquier ruta sirve el landing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck simple para Docker/observabilidad.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
